<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 일정 관리</title>
<style>
  :root{
    --bg:#f2f4f8;
    --bg-grad1:#eef1f8;
    --bg-grad2:#e8ecf5;
    --card:#ffffff;
    --card-soft:#f7f9fc;
    --text:#20242c;
    --text-sub:#6b7280;
    --border:#e5e8f0;
    --primary:#6366f1;
    --primary-dark:#4f46e5;
    --primary-soft:#eef0ff;
    --accent:#06b6d4;
    --danger:#ef4444;
    --danger-soft:#fee2e2;
    --warn:#f59e0b;
    --warn-soft:#fef3c7;
    --good:#10b981;
    --good-soft:#d1fae5;
    --shadow: 0 2px 8px rgba(30,41,59,.06), 0 8px 24px rgba(30,41,59,.05);
    --shadow-lg: 0 8px 30px rgba(30,41,59,.12);
    --radius:18px;
    --radius-sm:10px;
    --today-ring:#6366f1;
    --focus-ring:#6366f1;
  }
  html[data-theme="dark"]{
    --bg:#12131a;
    --bg-grad1:#14151d;
    --bg-grad2:#1a1c26;
    --card:#1b1d27;
    --card-soft:#20222e;
    --text:#e8e9ee;
    --text-sub:#9599a8;
    --border:#2a2c3a;
    --primary:#818cf8;
    --primary-dark:#6366f1;
    --primary-soft:#282a45;
    --accent:#22d3ee;
    --danger:#f87171;
    --danger-soft:#3b2130;
    --warn:#fbbf24;
    --warn-soft:#3a3120;
    --good:#34d399;
    --good-soft:#1c332b;
    --shadow: 0 2px 10px rgba(0,0,0,.35), 0 10px 30px rgba(0,0,0,.3);
    --shadow-lg: 0 12px 40px rgba(0,0,0,.5);
    --today-ring:#818cf8;
    --focus-ring:#818cf8;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family: "Malgun Gothic","맑은 고딕","Apple SD Gothic Neo","Segoe UI",sans-serif;
    background: radial-gradient(circle at 10% 0%, var(--bg-grad1), var(--bg-grad2) 60%);
    color:var(--text);
    min-height:100vh;
    transition: background .35s ease, color .25s ease;
    padding-bottom:40px;
  }
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
  a{color:inherit;}

  button:focus-visible, .cal-day:focus-visible, .checkbox:focus-visible,
  input:focus-visible, select:focus-visible, textarea:focus-visible{
    outline:2px solid var(--focus-ring);
    outline-offset:2px;
  }

  .app{
    max-width:1360px;
    margin:0 auto;
    padding:20px 24px 60px;
  }

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    margin-bottom:20px;
    flex-wrap:wrap;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:12px 20px;
    box-shadow:var(--shadow);
  }
  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .brand-logo{
    height:36px;width:auto;flex-shrink:0;
    border-radius:8px;background:#fff;padding:4px 8px;
  }
  .brand-divider{
    width:1px;align-self:stretch;background:var(--border);margin:2px 0;
  }
  .brand h1{font-size:21px;font-weight:800;margin:0;letter-spacing:-.4px;line-height:1.2;}
  .brand .sub{font-size:12px;color:var(--text-sub);margin-top:2px;}

  .top-controls{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .clock-box{
    background:var(--card-soft);
    border:1px solid var(--border);
    border-radius:12px;
    padding:8px 16px;
    text-align:right;
    min-width:140px;
  }
  .clock-time{
    font-size:18px;font-weight:800;letter-spacing:.3px;
    font-variant-numeric:tabular-nums;color:var(--text);line-height:1.15;
  }
  .clock-date{
    font-size:10.5px;font-weight:600;color:var(--text-sub);
    margin-top:3px;letter-spacing:.3px;
  }
  .sync-status{
    font-size:9.5px;font-weight:700;margin-top:4px;letter-spacing:.2px;
    color:var(--text-sub);opacity:.75;transition:color .2s, opacity .2s;
  }
  .sync-status.syncing{color:#F59E0B;opacity:1;}
  .sync-status.synced{color:#10B981;opacity:1;}
  .sync-status.offline{color:#EF4444;opacity:1;}

  .icon-btn{
    width:42px;height:42px;border-radius:12px;
    border:1px solid var(--border);
    background:var(--card);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:18px;
    box-shadow:var(--shadow);
    transition:transform .15s ease, background .2s;
  }
  .icon-btn:hover{transform:translateY(-2px);background:var(--card-soft);}
  .icon-btn:active{transform:translateY(0px) scale(.96);}

  .action-group{
    display:flex;align-items:center;gap:1px;
    background:var(--card-soft);border:1px solid var(--border);border-radius:12px;
    padding:6px;
  }
  .action-group .icon-btn{
    width:34px;height:34px;border:none;background:transparent;box-shadow:none;border-radius:9px;
    color:var(--text-sub);font-size:15px;font-weight:700;
    transition:background .15s ease, color .15s ease;
  }
  .action-group .icon-btn svg{width:17px;height:17px;}
  .action-group .icon-btn:hover{background:var(--card);color:var(--primary);transform:none;}
  .action-group .icon-btn:active{transform:scale(.92);}
  .action-group .icon-btn.icon-badge{
    background:var(--primary-soft);color:var(--primary);border-radius:50%;
  }
  .action-group .icon-btn.icon-badge:hover{background:var(--primary-soft);filter:brightness(.95);}
  .action-divider{width:1px;align-self:stretch;background:var(--border);margin:2px 4px;}
  .arrow-wide{display:inline-block;transform:scaleX(1.5);}

  /* ---------- Buttons ---------- */
  button{font-family:inherit;}
  .btn{
    border:none;border-radius:10px;padding:9px 16px;
    font-size:13px;font-weight:600;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;
    transition:transform .12s ease, box-shadow .2s, opacity .2s;
  }
  .btn:active{transform:scale(.96);}
  .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.35);}
  .btn-primary:hover{box-shadow:0 6px 18px rgba(99,102,241,.45);}
  .btn-soft{background:var(--card-soft);color:var(--text);border:1px solid var(--border);}
  .btn-soft:hover{background:var(--primary-soft);}
  .btn-danger{background:var(--danger-soft);color:var(--danger);}
  .btn-danger:hover{opacity:.85;}
  .btn-sm{padding:6px 10px;font-size:12px;border-radius:8px;}
  .btn-block{width:100%;justify-content:center;}

  /* ---------- Card ---------- */
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:18px;
    animation: fadeUp .45s ease both;
  }
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
  }
  .card-title{
    font-size:14px;font-weight:700;margin:0 0 12px;
    display:flex;align-items:center;justify-content:space-between;
    gap:8px;
  }
  .card-title .badge{
    background:var(--primary-soft);color:var(--primary);
    font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;
  }
  .section-subtitle{
    background:var(--card-soft);color:var(--text-sub);border:1px solid var(--border);
    font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;
  }

  /* ---------- AI Assistant Panel ---------- */
  .ai-panel{
    background:var(--card);
    border-radius:var(--radius);
    border-left:4px solid var(--primary);
    padding:20px 22px;
    margin-bottom:20px;
    box-shadow:var(--shadow);
    animation: fadeUp .5s ease both;
  }
  .ai-content{min-width:0;}
  .ai-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;}
  .ai-title{font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px;}
  .ai-dot{width:8px;height:8px;border-radius:50%;background:var(--good);box-shadow:0 0 0 3px var(--good-soft);}
  .ai-refresh{font-size:11px;color:var(--text-sub);cursor:pointer;text-decoration:underline;}
  .ai-text{font-size:13.5px;line-height:1.75;color:var(--text);white-space:pre-line;}
  .ai-text b{color:var(--primary);}
  .ai-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
  .ai-chip{
    font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:20px;
    display:flex;align-items:center;gap:5px;
  }
  .chip-info{background:var(--primary-soft);color:var(--primary);}
  .chip-warn{background:var(--warn-soft);color:var(--warn);}
  .chip-good{background:var(--good-soft);color:var(--good);}
  .chip-danger{background:var(--danger-soft);color:var(--danger);}

  .ai-tax-news{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
  .ai-tax-news-title{font-size:12.5px;font-weight:800;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
  .ai-tax-news-item{font-size:12.5px;line-height:1.65;}
  .ai-tax-news-item a{color:var(--text);text-decoration:none;}
  .ai-tax-news-item a:hover{color:var(--primary);text-decoration:underline;}
  .ai-tax-news-item::before{content:"•";color:var(--text-sub);margin-right:6px;}

  /* ---------- Briefing panel style toggle (B: 좌측 컬러 바 / C: 상단 배지 + 2단 그리드) ---------- */
  .ai-style-toggle{display:flex;gap:4px;}
  .ai-style-btn{
    font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;
    border:1px solid var(--border);background:var(--card-soft);color:var(--text-sub);
    cursor:pointer;transition:background .15s,color .15s,border-color .15s;
  }
  .ai-style-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  .ai-badge-c{
    display:none;font-size:11px;font-weight:800;background:var(--primary-soft);color:var(--primary);
    padding:4px 12px;border-radius:20px;
  }
  .ai-panel.style-c{border-left:none;border:1px solid var(--border);}
  .ai-panel.style-c .ai-title{display:none;}
  .ai-panel.style-c .ai-badge-c{display:inline-flex;}
  .ai-panel.style-c .ai-body{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
  .ai-panel.style-c .ai-tax-news{border-top:none;border-left:1px solid var(--border);margin-top:0;padding-top:0;padding-left:20px;}
  @media (max-width:760px){
    .ai-panel.style-c .ai-body{grid-template-columns:1fr;}
    .ai-panel.style-c .ai-tax-news{border-left:none;border-top:1px solid var(--border);margin-top:14px;padding-top:12px;padding-left:0;}
  }

  /* ---------- Layout ---------- */
  .layout{
    display:grid;
    grid-template-columns: 1.6fr 1fr;
    gap:20px;
    align-items:start;
  }
  @media (max-width: 980px){
    .layout{grid-template-columns:1fr;}
  }
  .col{display:flex;flex-direction:column;gap:20px;min-width:0;}

  /* ---------- Toolbar (search/filter) ---------- */
  .toolbar{
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px;
  }
  .search-box{
    flex:1;min-width:160px;
    display:flex;align-items:center;gap:8px;
    background:var(--card-soft);
    border:1px solid var(--border);
    border-radius:10px;padding:8px 12px;
  }
  .search-box input{
    border:none;background:transparent;outline:none;font-size:13px;width:100%;color:var(--text);
  }
  select, input[type=text], input[type=date], input[type=time], textarea{
    font-family:inherit;
    background:var(--card-soft);
    border:1px solid var(--border);
    color:var(--text);
    border-radius:10px;
    padding:8px 10px;
    font-size:13px;
    outline:none;
  }
  select:focus, input:focus, textarea:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 3px var(--primary-soft);
  }
  /* Let native date/time picker icons, popups and the clear (X) button follow the app's theme */
  input[type=date], input[type=time]{
    color-scheme: light;
    cursor:pointer;
  }
  html[data-theme="dark"] input[type=date], html[data-theme="dark"] input[type=time]{
    color-scheme: dark;
  }

  /* ---------- Calendar ---------- */
  .cal-header{
    display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;
  }
  .cal-nav{display:flex;align-items:center;gap:10px;}
  .cal-title{font-size:17px;font-weight:800;min-width:120px;text-align:center;}
  .cal-nav-btn{
    width:40px;height:40px;border-radius:10px;border:1px solid var(--border);
    background:var(--card-soft);cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:28px;font-weight:800;line-height:1;color:var(--text);transition:background .15s;
  }
  .cal-nav-btn:hover{background:var(--primary-soft);color:var(--primary);}
  .cal-today-btn{font-size:12px;padding:6px 12px;}

  .cal-grid{
    display:grid;grid-template-columns:repeat(7,1fr);gap:8px;
  }
  .cal-dow{
    text-align:center;font-size:11.5px;font-weight:700;color:var(--text-sub);padding:6px 0 10px;
  }
  .cal-dow.sun{color:var(--danger);}
  .cal-dow.sat{color:var(--primary);}

  .cal-day{
    background:var(--card-soft);
    border:1px solid var(--border);
    border-radius:10px;
    min-height:96px;
    padding:7px;
    cursor:pointer;
    position:relative;
    transition:background .15s ease, transform .12s ease, box-shadow .15s;
    display:flex;flex-direction:column;gap:4px;
    overflow:hidden;
  }
  .cal-day:hover{background:var(--primary-soft);transform:translateY(-2px);box-shadow:var(--shadow);}
  .cal-day.empty{cursor:default;}
  .cal-day.empty:hover{transform:none;box-shadow:none;background:var(--card-soft);}
  .cal-day.today{border:2px solid var(--today-ring);}
  .cal-day.selected{outline:2px solid var(--primary);outline-offset:-2px;}
  .cal-daynum{font-size:12px;font-weight:700;}
  .cal-day.sun .cal-daynum{color:var(--danger);}
  .cal-day.sat .cal-daynum{color:var(--primary);}
  .cal-events{display:flex;flex-direction:column;gap:2px;overflow:hidden;}
  .cal-event-pill{
    font-size:10px;padding:2px 5px;border-radius:5px;
    background:var(--primary-soft);color:var(--primary);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    font-weight:600;
  }
  .cal-event-pill.important{background:var(--danger-soft);color:var(--danger);}
  .cal-more{font-size:11px;color:var(--text-sub);padding-left:4px;}

  /* ---------- Mini calendars (each fills exactly one grid cell) ---------- */
  .mini-cal{
    min-height:96px;background:var(--card-soft);border:1px solid var(--border);
    border-radius:10px;padding:4px 5px;display:flex;flex-direction:column;overflow:hidden;
  }
  .mini-cal-title{font-size:9px;font-weight:700;color:var(--text-sub);text-align:center;margin-bottom:3px;}
  .mini-cal-dow{display:grid;grid-template-columns:repeat(7,1fr);}
  .mini-cal-dow span{text-align:center;font-size:6.5px;font-weight:700;color:var(--text-sub);line-height:1.4;}
  .mini-cal-dow span.sun{color:var(--danger);}
  .mini-cal-dow span.sat{color:var(--primary);}
  .mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;flex:1;}
  .mini-cal-day{
    display:flex;align-items:center;justify-content:center;
    font-size:7.5px;color:var(--text);cursor:pointer;border-radius:2px;line-height:1;
  }
  .mini-cal-day:hover{background:var(--primary-soft);}
  .mini-cal-day.empty{cursor:default;}
  .mini-cal-day.empty:hover{background:transparent;}
  .mini-cal-day.sun{color:var(--danger);}
  .mini-cal-day.sat{color:var(--primary);}
  .mini-cal-day.today{outline:1px solid var(--today-ring);outline-offset:-1px;}

  /* ---------- Lists (todo/memo/day-events) ---------- */
  .list{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto;padding-right:2px;}
  .empty-state{
    text-align:center;color:var(--text-sub);font-size:12.5px;padding:26px 10px;
  }

  .item{
    background:var(--card-soft);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    display:flex;align-items:flex-start;gap:10px;
    animation: fadeUp .25s ease both;
    transition:box-shadow .15s, transform .12s;
  }
  .item:hover{box-shadow:var(--shadow);}
  .item.done{opacity:.55;}
  .item.done .item-title{text-decoration:line-through;}

  .checkbox{
    width:19px;height:19px;border-radius:6px;border:2px solid var(--border);
    flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
    margin-top:1px;transition:background .15s, border-color .15s;
  }
  .checkbox.checked{background:var(--good);border-color:var(--good);color:#fff;font-size:12px;}

  /* ---------- Pastel cards (To-Do / Memo) ---------- */
  .pastel-card{
    border:none;
    border-radius:14px;
    padding:12px 14px;
    box-shadow:0 1px 3px rgba(20,20,30,.05);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .pastel-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(20,20,30,.10);}
  .pastel-card .checkbox{
    width:22px;height:22px;border-radius:50%;
    border:2px solid rgba(0,0,0,.2);
    background:rgba(255,255,255,.55);
  }
  html[data-theme="dark"] .pastel-card .checkbox{
    border-color:rgba(255,255,255,.32);
    background:rgba(0,0,0,.22);
  }

  .pastel-0{background:#ffe8d6;}
  .pastel-1{background:#fff6cc;}
  .pastel-2{background:#d9f5e3;}
  .pastel-3{background:#dbeeff;}
  .pastel-4{background:#e6def9;}
  .pastel-5{background:#ffe0ec;}
  html[data-theme="dark"] .pastel-0{background:#4a3626;}
  html[data-theme="dark"] .pastel-1{background:#4a4420;}
  html[data-theme="dark"] .pastel-2{background:#234a34;}
  html[data-theme="dark"] .pastel-3{background:#1f3a54;}
  html[data-theme="dark"] .pastel-4{background:#362a52;}
  html[data-theme="dark"] .pastel-5{background:#4a2536;}

  .pastel-0 .checkbox.checked{background:#ff9a56;border-color:#ff9a56;}
  .pastel-1 .checkbox.checked{background:#f2c744;border-color:#f2c744;}
  .pastel-2 .checkbox.checked{background:#4caf7d;border-color:#4caf7d;}
  .pastel-3 .checkbox.checked{background:#4a90e2;border-color:#4a90e2;}
  .pastel-4 .checkbox.checked{background:#9b7de0;border-color:#9b7de0;}
  .pastel-5 .checkbox.checked{background:#ff6f9c;border-color:#ff6f9c;}

  .pastel-card .item-actions button{color:rgba(0,0,0,.45);}
  html[data-theme="dark"] .pastel-card .item-actions button{color:rgba(255,255,255,.55);}
  .pastel-card .item-actions button:hover{background:rgba(0,0,0,.08);color:inherit;}
  html[data-theme="dark"] .pastel-card .item-actions button:hover{background:rgba(255,255,255,.12);}

  .item-body{flex:1;min-width:0;}
  .item-title{font-size:13px;font-weight:600;word-break:break-word;}
  .item-meta{font-size:11px;color:var(--text-sub);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}

  /* ---------- Memo text readability ---------- */
  #memoList .item{padding:16px 20px;}
  #memoList .item-title{
    font-size:14px;font-weight:500;line-height:1.7;text-align:left;
    white-space:pre-wrap;
    word-break:keep-all;
    overflow-wrap:break-word;
    max-width:800px;margin:0 auto;
  }
  .tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;}
  .tag-work{background:var(--primary-soft);color:var(--primary);}
  .tag-personal{background:var(--good-soft);color:var(--good);}
  .tag-important{background:var(--danger-soft);color:var(--danger);}
  .tag-etc{background:var(--warn-soft);color:var(--warn);}
  .tag-edu{background:#e0f2fe;color:#0284c7;}
  html[data-theme="dark"] .tag-edu{background:#123246;color:#38bdf8;}
  .tag-meeting{background:#fce7f3;color:#db2777;}
  html[data-theme="dark"] .tag-meeting{background:#3a1930;color:#f472b6;}
  .tag-recur{background:#e0e7ff;color:#4f46e5;}
  html[data-theme="dark"] .tag-recur{background:#2b2f52;color:#a5b4fc;}

  .tag-exp-fixed{background:#fee2e2;color:#dc2626;}
  html[data-theme="dark"] .tag-exp-fixed{background:#3a1a1a;color:#f87171;}
  .tag-exp-variable{background:#fef3c7;color:#d97706;}
  html[data-theme="dark"] .tag-exp-variable{background:#3a2f14;color:#fbbf24;}
  .tag-exp-labor{background:#ede9fe;color:#7c3aed;}
  html[data-theme="dark"] .tag-exp-labor{background:#2a2140;color:#c4b5fd;}
  .tag-exp-tax{background:#dbeafe;color:#2563eb;}
  html[data-theme="dark"] .tag-exp-tax{background:#152238;color:#60a5fa;}
  .tag-exp-etc{background:#f1f5f9;color:#64748b;}
  html[data-theme="dark"] .tag-exp-etc{background:#252831;color:#94a3b8;}
  .expense-amount{font-weight:800;color:var(--text);white-space:nowrap;}
  .cal-event-pill.expense{background:var(--good-soft);color:var(--good);}

  /* ---------- Expense list refinements ---------- */
  #expenseList .item{padding:14px 16px;align-items:center;gap:14px;}
  #expenseList .item-title{font-size:13.5px;font-weight:600;}
  #expenseList .item-meta{margin-top:4px;gap:8px;}
  #expenseList .tag{padding:3px 9px;}
  #expenseList .expense-amount{
    font-size:15.5px;font-weight:700;letter-spacing:-.1px;
    font-variant-numeric:tabular-nums;
  }
  #expenseList .item-actions{gap:2px;margin-left:2px;padding-left:12px;border-left:1px solid var(--border);}

  .item-actions{display:flex;gap:4px;flex-shrink:0;}
  .item-actions button{
    width:26px;height:26px;border:none;border-radius:7px;background:transparent;
    cursor:pointer;font-size:13px;color:var(--text-sub);display:flex;align-items:center;justify-content:center;
    transition:background .15s;
  }
  .item-actions button:hover{background:var(--border);color:var(--text);}

  .add-inline{display:flex;gap:8px;margin-top:12px;}
  .add-inline input{flex:1;}
  .todo-add-row{flex-wrap:wrap;}
  .todo-add-row input[type=text]{flex:1;min-width:110px;}
  .todo-add-row select{flex:0 0 auto;width:auto;}
  .todo-add-row input[type=date]{flex:0 0 auto;width:132px;}

  .tag-prio-high{background:var(--danger-soft);color:var(--danger);}
  .tag-prio-medium{background:var(--warn-soft);color:var(--warn);}
  .tag-prio-low{background:var(--primary-soft);color:var(--primary);}
  .due-badge{font-size:11px;color:var(--text-sub);}
  .due-overdue{color:var(--danger);font-weight:700;}

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(15,17,25,.5);
    display:flex;align-items:center;justify-content:center;z-index:100;
    opacity:0;pointer-events:none;transition:opacity .2s ease;
    padding:20px;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open{opacity:1;pointer-events:auto;}
  .modal{
    background:var(--card);border-radius:16px;padding:22px;
    width:100%;max-width:440px;max-height:88vh;overflow-y:auto;
    box-shadow:var(--shadow-lg);
    transform:translateY(16px) scale(.98);opacity:0;
    transition:transform .25s ease, opacity .25s ease;
  }
  .modal-overlay.open .modal{transform:translateY(0) scale(1);opacity:1;}
  .modal h2{margin:0 0 16px;font-size:17px;font-weight:800;letter-spacing:-.2px;}
  .modal-header{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
  .modal-header h2{margin:0;}
  .modal-header-icon{
    width:38px;height:38px;border-radius:11px;flex-shrink:0;
    background:linear-gradient(135deg, var(--primary), var(--accent));
    display:flex;align-items:center;justify-content:center;color:#fff;
    box-shadow:0 4px 12px rgba(99,102,241,.35);
  }
  .form-row{margin-bottom:16px;}
  .form-row label{
    display:flex;align-items:center;gap:6px;
    font-size:12px;font-weight:700;color:var(--text-sub);margin-bottom:7px;
    letter-spacing:.1px;
  }
  .field-icon{width:14px;height:14px;flex-shrink:0;color:var(--text-sub);}
  .form-row input, .form-row select, .form-row textarea{width:100%;}
  .modal select, .modal input[type=text], .modal input[type=date], .modal input[type=time], .modal textarea{
    padding:10px 12px;border-radius:12px;
  }
  .form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-check{
    display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;
    margin-top:2px;background:var(--card-soft);border:1px solid var(--border);
    border-radius:12px;padding:11px 14px;
  }
  .form-check svg{color:var(--warn);flex-shrink:0;}
  .form-check input{width:auto;accent-color:var(--primary);}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:22px;}
  .modal-actions .btn{padding:10px 18px;}
  textarea{resize:vertical;min-height:60px;}

  /* ---------- Custom date picker (event date field) ---------- */
  #eventDate{cursor:pointer;}
  .edp-popup{
    position:fixed;z-index:300;
    background:var(--card);border:1px solid var(--border);border-radius:14px;
    box-shadow:var(--shadow-lg);padding:14px;width:266px;
    opacity:0;pointer-events:none;transform:translateY(-6px);
    transition:opacity .15s ease, transform .15s ease;
  }
  .edp-popup.open{opacity:1;pointer-events:auto;transform:translateY(0);}
  .edp-header{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
  .edp-header select{flex:1;padding:6px 4px;font-size:12.5px;font-weight:700;text-align:center;}
  .edp-nav{
    width:28px;height:28px;border-radius:8px;border:1px solid var(--border);
    background:var(--card-soft);cursor:pointer;font-size:16px;font-weight:800;line-height:1;
    display:flex;align-items:center;justify-content:center;color:var(--text);flex-shrink:0;
    transition:background .15s;
  }
  .edp-nav:hover{background:var(--primary-soft);color:var(--primary);}
  .edp-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px;}
  .edp-dow span{text-align:center;font-size:11px;font-weight:700;color:var(--text-sub);padding:4px 0;}
  .edp-dow span.sun{color:var(--danger);}
  .edp-dow span.sat{color:var(--primary);}
  .edp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .edp-day{
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    font-size:12.5px;font-weight:600;border-radius:8px;cursor:pointer;color:var(--text);
    transition:background .12s;
  }
  .edp-day:hover{background:var(--primary-soft);}
  .edp-day.empty{cursor:default;}
  .edp-day.empty:hover{background:transparent;}
  .edp-day.sun{color:var(--danger);}
  .edp-day.sat{color:var(--primary);}
  .edp-day.today{outline:1.5px solid var(--today-ring);outline-offset:-1.5px;}
  .edp-day.selected{background:var(--primary);color:#fff;}

  /* ---------- Custom time picker (30-minute step scroll list) ---------- */
  .select-wrap{position:relative;}
  .select-wrap input{padding-right:28px;width:100%;}
  .select-arrow{
    position:absolute;right:10px;top:50%;transform:translateY(-50%);
    pointer-events:none;color:var(--text-sub);font-size:11px;line-height:1;
    display:flex;align-items:center;justify-content:center;
  }
  .time-input{cursor:pointer;}
  .time-dropdown{
    position:fixed;z-index:300;
    background:var(--card);border:1px solid var(--border);border-top:none;
    border-radius:0 0 10px 10px;
    box-shadow:var(--shadow-lg);
    max-height:220px;overflow-y:auto;
    opacity:0;pointer-events:none;
    transition:opacity .12s ease;
  }
  .time-dropdown.open{opacity:1;pointer-events:auto;}
  .time-option{
    padding:8px 14px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;
    transition:background .12s;
  }
  .time-option:hover{background:var(--primary-soft);color:var(--primary);}
  .time-option.selected{background:var(--primary);color:#fff;}

  /* ---------- Toast ---------- */
  .toast-wrap{
    position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:200;
  }
  .toast{
    background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow-lg);
    border-radius:10px;padding:12px 16px;font-size:13px;min-width:220px;max-width:320px;
    display:flex;align-items:center;gap:8px;
    animation: slideIn .3s ease both;
  }
  @keyframes slideIn{
    from{opacity:0;transform:translateX(30px);}
    to{opacity:1;transform:translateX(0);}
  }
  .toast.success{border-left:4px solid var(--good);}
  .toast.error{border-left:4px solid var(--danger);}
  .toast.info{border-left:4px solid var(--primary);}

  /* ---------- Filter row inside sections ---------- */
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .filter-row select{flex:1;min-width:90px;}

  .segmented{display:flex;background:var(--card-soft);border:1px solid var(--border);border-radius:9px;padding:3px;gap:2px;}
  .segmented button{
    flex:1;border:none;background:transparent;padding:6px 8px;border-radius:7px;font-size:12px;font-weight:600;
    color:var(--text-sub);cursor:pointer;transition:background .15s,color .15s;
  }
  .segmented button.active{background:var(--primary);color:#fff;}

  .hidden{display:none !important;}

  footer.app-footer{
    text-align:center;color:var(--text-sub);font-size:11px;margin-top:30px;
  }

  @media (max-width:600px){
    .app{padding:14px;}
    .cal-day{min-height:70px;}
    .cal-event-pill{font-size:10px;}
    .brand h1{font-size:17px;}
    .clock-box{min-width:0;}
  }
</style>
</head>

  <!-- MAIN LAYOUT -->
  <div class="layout">
    <!-- LEFT: Calendar + selected day events -->
    <div class="col">
      <div class="card">
        <div class="cal-header">
          <div class="cal-nav">
            <button class="cal-nav-btn" id="prevMonth" aria-label="이전 달">‹</button>
            <div class="cal-title" id="calTitle">2026년 1월</div>
            <button class="cal-nav-btn" id="nextMonth" aria-label="다음 달">›</button>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-soft cal-today-btn" id="gotoToday">오늘</button>
            <button class="btn btn-primary btn-sm" id="addEventBtn">+ 일정 추가</button>
          </div>
        </div>

        <div class="toolbar">
          <div class="search-box">
            <span>🔎</span>
            <input type="text" id="searchInput" placeholder="일정 검색 (제목, 내용)">
          </div>
          <select id="filterCategory">
            <option value="all">전체 카테고리</option>
            <option value="업무">업무</option>
            <option value="개인">개인</option>
            <option value="회의">회의</option>
            <option value="교육">교육</option>
            <option value="중요">중요</option>
            <option value="기타">기타</option>
          </select>
          <select id="filterImportant">
            <option value="all">전체</option>
            <option value="important">중요만</option>
          </select>
        </div>

        <div class="cal-grid" id="calDow"></div>
        <div class="cal-grid" id="calGrid" style="margin-top:6px;"></div>
      </div>

      <div class="card">
        <div class="card-title">
          <span id="selectedDayTitle">오늘 일정</span>
          <span class="badge" id="selectedDayCount">0</span>
        </div>
        <div class="list" id="dayEventList"></div>
      </div>
    </div>

    <!-- RIGHT: Todo + Memo -->
    <div class="col">
      <div class="card">
        <div class="card-title">
          <span>✅ To-Do List</span>
          <span class="badge" id="todoCount">0</span>
        </div>
        <div class="filter-row">
          <div class="segmented" id="todoFilter">
            <button class="active" data-f="all">전체</button>
            <button data-f="active">진행</button>
            <button data-f="done">완료</button>
          </div>
          <select id="todoSort">
            <option value="default">기본 정렬</option>
            <option value="due">마감일순</option>
            <option value="priority">우선순위순</option>
          </select>
        </div>
        <div class="add-inline todo-add-row">
          <input type="text" id="todoInput" placeholder="할 일을 입력하고 Enter">
          <select id="todoPriorityInput" title="우선순위">
            <option value="high">🔴 높음</option>
            <option value="medium" selected>🟡 보통</option>
            <option value="low">🔵 낮음</option>
          </select>
          <input type="date" id="todoDueInput" title="마감일">
          <button class="btn btn-primary btn-sm" id="todoAddBtn">추가</button>
        </div>
        <div class="list" id="todoList" style="margin-top:12px;"></div>
      </div>

      <div class="card">
        <div class="card-title">
          <span>📝 메모</span>
          <span class="badge" id="memoCount">0</span>
        </div>
        <div class="add-inline">
          <input type="text" id="memoInput" placeholder="메모를 입력하고 Enter">
          <button class="btn btn-primary btn-sm" id="memoAddBtn">추가</button>
        </div>
        <div class="list" id="memoList" style="margin-top:12px;"></div>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:20px;">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function(){
  "use strict";

  /* ============ Storage Keys ============ */
  const LS_EVENTS = "aisch_events";
  const LS_TODOS  = "aisch_todos";
  const LS_MEMOS  = "aisch_memos";
  const LS_THEME  = "aisch_theme";
  const LS_NOTIFIED = "aisch_notified";
  const LS_EXPENSES = "aisch_expenses";

  /* ============ Cloud Sync (Supabase) ============ */
  const CLOUD_URL = "https://pbeyogjjflkiwhxutpva.supabase.co";
  const CLOUD_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiZXlvZ2pqZmxraXdoeHV0cHZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MTkwMDQsImV4cCI6MjA5OTQ5NTAwNH0.-Tgn0xVWALZ-fsz9hI1vw6VBarhyAa_aGfkFMcK14og";
  const CLOUD_TABLE = "scheduler_state";
  const CLOUD_ROW_ID = "default";
  let cloudClient = null;
  try{ cloudClient = window.supabase ? window.supabase.createClient(CLOUD_URL, CLOUD_ANON_KEY) : null; }catch(e){ cloudClient = null; }
  let cloudSyncTimer = null;

  function setSyncStatus(state){
    const el = document.getElementById("syncStatus");
    if(!el) return;
    if(state==="syncing"){ el.textContent = "☁ 저장 중..."; el.className = "sync-status syncing"; }
    else if(state==="synced"){ el.textContent = "☁ 동기화됨"; el.className = "sync-status synced"; }
    else if(state==="loading"){ el.textContent = "☁ 불러오는 중..."; el.className = "sync-status syncing"; }
    else { el.textContent = "☁ 오프라인"; el.className = "sync-status offline"; }
  }

  function scheduleCloudSync(){
    if(!cloudClient) { setSyncStatus("offline"); return; }
    setSyncStatus("syncing");
    clearTimeout(cloudSyncTimer);
    cloudSyncTimer = setTimeout(pushToCloud, 800);
  }

  async function pushToCloud(){
    if(!cloudClient) return;
    const payload = { events, todos, memos, expenses, notified: Array.from(notifiedSet) };
    try{
      const { error } = await cloudClient.from(CLOUD_TABLE).upsert({ id: CLOUD_ROW_ID, data: payload, updated_at: new Date().toISOString() });
      if(error) throw error;
      setSyncStatus("synced");
    }catch(e){
      setSyncStatus("offline");
    }
  }

  async function loadFromCloud(){
    if(!cloudClient){ setSyncStatus("offline"); return; }
    setSyncStatus("loading");
    try{
      const { data, error } = await cloudClient.from(CLOUD_TABLE).select("data").eq("id", CLOUD_ROW_ID).maybeSingle();
      if(error) throw error;
      const cloud = data && data.data ? data.data : null;
      const cloudHasContent = !!(cloud && (
        (cloud.events && cloud.events.length) ||
        (cloud.todos && cloud.todos.length) ||
        (cloud.memos && cloud.memos.length) ||
        (cloud.expenses && cloud.expenses.length)
      ));
      if(cloudHasContent){
        events = cloud.events || [];
        todos = cloud.todos || [];
        memos = cloud.memos || [];
        expenses = cloud.expenses || [];
        notifiedSet = new Set(cloud.notified || []);
        save(LS_EVENTS, events); save(LS_TODOS, todos); save(LS_MEMOS, memos);
        save(LS_EXPENSES, expenses); save(LS_NOTIFIED, Array.from(notifiedSet));
        setSyncStatus("synced");
      } else {
        setSyncStatus("synced");
        pushToCloud();
      }
    }catch(e){
      setSyncStatus("offline");
    }
  }

  /* ============ State ============ */
  let events = load(LS_EVENTS, []);
  let todos  = load(LS_TODOS, []);
  let memos  = load(LS_MEMOS, []);
  let notifiedSet = new Set(load(LS_NOTIFIED, []));
  let expenses = load(LS_EXPENSES, []);

  let viewYear, viewMonth; // 0-based month
  let selectedDate = fmtDate(new Date());
  let todoFilterMode = "all";
  let expenseCategoryFilterMode = "all";

  const today = new Date();
  viewYear = today.getFullYear();
  viewMonth = today.getMonth();

  /* ============ Helpers ============ */
  function load(key, fallback){
    try{
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    }catch(e){ return fallback; }
  }
  function save(key, val){
    try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
  }
  function saveEvents(){ save(LS_EVENTS, events); scheduleCloudSync(); }
  function saveTodos(){ save(LS_TODOS, todos); scheduleCloudSync(); }
  function saveMemos(){ save(LS_MEMOS, memos); scheduleCloudSync(); }
  function saveNotified(){ save(LS_NOTIFIED, Array.from(notifiedSet)); scheduleCloudSync(); }
  function saveExpenses(){ save(LS_EXPENSES, expenses); scheduleCloudSync(); }

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

  function fmtDate(d){
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  }
  function parseDate(str){
    const [y,m,d] = str.split("-").map(Number);
    return new Date(y, m-1, d);
  }
  function todayStr(){ return fmtDate(new Date()); }

  function toast(msg, type){
    type = type || "info";
    const wrap = document.getElementById("toastWrap");
    const el = document.createElement("div");
    el.className = "toast " + type;
    const icon = type==="success"?"✅":type==="error"?"⚠️":"💬";
    el.innerHTML = `<span>${icon}</span><span>${escapeHtml(msg)}</span>`;
    wrap.appendChild(el);
    setTimeout(()=>{
      el.style.transition="opacity .3s, transform .3s";
      el.style.opacity="0";
      el.style.transform="translateX(30px)";
      setTimeout(()=>el.remove(), 300);
    }, 3200);
  }

  function escapeHtml(str){
    const d = document.createElement("div");
    d.textContent = str==null? "" : String(str);
    return d.innerHTML;
  }

  function fmtWon(n){
    return ((Number(n)||0) / 100000000).toFixed(2) + "억";
  }

  function parseAmountValue(str){
    return Number(String(str||"").replace(/,/g, "")) || 0;
  }
  function formatAmountInputValue(str){
    const digits = String(str||"").replace(/[^\d]/g, "");
    if(!digits) return "";
    return Number(digits).toLocaleString("ko-KR");
  }

  /* ============ Real-time Clock ============ */
  function tickClock(){
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,"0");
    const mm = String(now.getMinutes()).padStart(2,"0");
    const ss = String(now.getSeconds()).padStart(2,"0");
    document.getElementById("clockTime").textContent = `${hh}:${mm}:${ss}`;
    const days = ["일","월","화","수","목","금","토"];
    document.getElementById("clockDate").textContent =
      `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
  }
  setInterval(tickClock, 1000);
  tickClock();

  /* ============ Theme ============ */
  function applyTheme(t){
    document.documentElement.setAttribute("data-theme", t);
    document.getElementById("themeBtn").innerHTML = t === "dark"
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>';
    save(LS_THEME, t);
  }
  let savedTheme = load(LS_THEME, null);
  if(!savedTheme){
    savedTheme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  }
  applyTheme(savedTheme);
  document.getElementById("themeBtn").addEventListener("click", ()=>{
    const cur = document.documentElement.getAttribute("data-theme");
    applyTheme(cur === "dark" ? "light" : "dark");
  });

  /* ============ Recurrence expansion ============ */
  // If the event is flagged weekendAdjust, push a Sat/Sun occurrence to the following Monday
  // (e.g. VAT/withholding tax filing deadlines that must fall on a business day).
  function adjustForWeekend(d){
    const day = d.getDay();
    if(day === 6) d.setDate(d.getDate()+2);
    else if(day === 0) d.setDate(d.getDate()+1);
    return d;
  }

  // Returns array of Date objects (occurrences) for event within [rangeStart, rangeEnd] inclusive
  function getOccurrences(ev, rangeStart, rangeEnd){
    const base = parseDate(ev.date);
    const out = [];
    const recur = ev.recur || "none";
    const recurEnd = ev.recurEnd ? parseDate(ev.recurEnd) : null;

    if(recur === "none"){
      let occDate = new Date(base);
      if(ev.weekendAdjust) occDate = adjustForWeekend(occDate);
      if(occDate >= rangeStart && occDate <= rangeEnd) out.push(occDate);
      return out;
    }

    let cursor = new Date(base);
    let guard = 0;
    while(cursor <= rangeEnd && guard < 2000){
      guard++;
      if(recurEnd && cursor > recurEnd) break;
      if(cursor >= base){
        let occDate = new Date(cursor);
        if(ev.weekendAdjust) occDate = adjustForWeekend(occDate);
        if(occDate >= rangeStart && occDate <= rangeEnd) out.push(occDate);
      }
      if(recur === "daily") cursor.setDate(cursor.getDate()+1);
      else if(recur === "weekly") cursor.setDate(cursor.getDate()+7);
      else if(recur === "monthly") cursor.setMonth(cursor.getMonth()+1);
      else if(recur === "yearly") cursor.setFullYear(cursor.getFullYear()+1);
      else break;
    }
    return out;
  }

  // Get all occurrences (as {ev, date}) across all events for a date range
  function getOccurrencesInRange(rangeStart, rangeEnd){
    const list = [];
    events.forEach(ev=>{
      const occs = getOccurrences(ev, rangeStart, rangeEnd);
      occs.forEach(d=> list.push({ ev, dateObj: d, dateStr: fmtDate(d) }));
    });
    return list;
  }

  function getEventsForDate(dateStr){
    const d = parseDate(dateStr);
    return getOccurrencesInRange(d, d).map(o=>o.ev).sort((a,b)=>(a.start||"").localeCompare(b.start||""));
  }

  /* ============ Expense occurrence helpers ============ */
  // For monthly-recurring expenses, the due day-of-month is clamped to the last valid day
  // of shorter months (e.g. an anchor of the 31st falls on Feb 28/29).
  function clampDayToMonth(year, month, day){
    const lastDay = new Date(year, month+1, 0).getDate();
    return Math.min(day, lastDay);
  }
  function getExpensesForMonth(year, month){
    const out = [];
    expenses.forEach(ex=>{
      const anchor = parseDate(ex.date);
      if(ex.recur === "monthly"){
        const anchorMonthStart = new Date(anchor.getFullYear(), anchor.getMonth(), 1);
        const viewMonthStart = new Date(year, month, 1);
        if(viewMonthStart < anchorMonthStart) return;
        const day = clampDayToMonth(year, month, anchor.getDate());
        out.push({ ex, dateStr: fmtDate(new Date(year, month, day)) });
      } else {
        if(anchor.getFullYear()===year && anchor.getMonth()===month){
          out.push({ ex, dateStr: ex.date });
        }
      }
    });
    out.sort((a,b)=>a.dateStr.localeCompare(b.dateStr));
    return out;
  }

  /* ============ Filters/Search state ============ */
  function getActiveFilters(){
    return {
      q: document.getElementById("searchInput").value.trim().toLowerCase(),
      cat: document.getElementById("filterCategory").value,
      imp: document.getElementById("filterImportant").value
    };
  }
  function matchesFilters(ev, f){
    if(f.cat !== "all" && ev.category !== f.cat) return false;
    if(f.imp === "important" && !ev.important) return false;
    if(f.q){
      const hay = (ev.title + " " + (ev.desc||"")).toLowerCase();
      if(!hay.includes(f.q)) return false;
    }
    return true;
  }

  /* ============ Calendar Rendering ============ */
  const DOW = ["일","월","화","수","목","금","토"];
  function renderDow(){
    const el = document.getElementById("calDow");
    el.innerHTML = DOW.map((d,i)=>`<div class="cal-dow ${i===0?"sun":i===6?"sat":""}">${d}</div>`).join("");
  }

  function renderCalendar(){
    document.getElementById("calTitle").textContent = `${viewYear}년 ${viewMonth+1}월`;
    const grid = document.getElementById("calGrid");
    grid.innerHTML = "";

    const firstDay = new Date(viewYear, viewMonth, 1);
    const startOffset = firstDay.getDay();
    const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();

    const rangeStart = new Date(viewYear, viewMonth, 1);
    const rangeEnd = new Date(viewYear, viewMonth+1, 0);
    const occs = getOccurrencesInRange(rangeStart, rangeEnd);
    const byDate = {};
    const f = getActiveFilters();
    occs.forEach(o=>{
      if(!matchesFilters(o.ev, f)) return;
      (byDate[o.dateStr] = byDate[o.dateStr] || []).push(o.ev);
    });

    const expByDate = {};
    getExpensesForMonth(viewYear, viewMonth).forEach(o=>{
      (expByDate[o.dateStr] = expByDate[o.dateStr] || []).push(o.ex);
    });

    const trailingCount = (7 - (startOffset + daysInMonth) % 7) % 7;
    let prevY = viewYear, prevM = viewMonth - 1;
    if(prevM < 0){ prevM = 11; prevY--; }
    let nextY = viewYear, nextM = viewMonth + 1;
    if(nextM > 11){ nextM = 0; nextY++; }

    // Prefer the leading blanks for the prev/next-month mini calendars (needs at
    // least 2 cells); if there's no room there, fall back to the trailing blanks.
    const miniInLeading = startOffset >= 2;
    const miniInTrailing = !miniInLeading && trailingCount >= 2;

    function appendEmptyBox(){
      const cell = document.createElement("div");
      cell.className = "cal-day empty";
      grid.appendChild(cell);
    }
    function appendMiniPair(){
      grid.appendChild(buildSingleMiniCal(prevY, prevM, `${prevM+1}월`));
      grid.appendChild(buildSingleMiniCal(nextY, nextM, `${nextM+1}월`));
    }

    if(miniInLeading){
      appendMiniPair();
      for(let i=2;i<startOffset;i++) appendEmptyBox();
    } else {
      for(let i=0;i<startOffset;i++) appendEmptyBox();
    }

    const todayString = todayStr();
    for(let day=1; day<=daysInMonth; day++){
      const dateStr = fmtDate(new Date(viewYear, viewMonth, day));
      const dow = new Date(viewYear, viewMonth, day).getDay();
      const cell = document.createElement("div");
      cell.className = "cal-day" + (dow===0?" sun":dow===6?" sat":"") + (dateStr===todayString?" today":"") + (dateStr===selectedDate?" selected":"");
      cell.dataset.date = dateStr;
      cell.tabIndex = 0;
      cell.setAttribute("role", "button");
      cell.setAttribute("aria-label", `${viewYear}년 ${viewMonth+1}월 ${day}일`);

      const evs = (byDate[dateStr]||[]).slice().sort((a,b)=>(a.start||"").localeCompare(b.start||""));
      const exps = expByDate[dateStr] || [];
      let pillsHtml = "";
      const maxShow = 3;
      evs.slice(0,maxShow).forEach(ev=>{
        pillsHtml += `<div class="cal-event-pill ${ev.important?"important":""}">${escapeHtml(ev.title)}</div>`;
      });
      if(evs.length > maxShow){
        pillsHtml += `<div class="cal-more">+${evs.length-maxShow}개 더보기</div>`;
      }
      exps.slice(0,2).forEach(ex=>{
        pillsHtml += `<div class="cal-event-pill expense">💰 ${escapeHtml(ex.title)}</div>`;
      });
      if(exps.length > 2){
        pillsHtml += `<div class="cal-more">지출 +${exps.length-2}건</div>`;
      }

      cell.innerHTML = `<div class="cal-daynum">${day}</div><div class="cal-events">${pillsHtml}</div>`;
      const selectThisDay = ()=>{
        selectedDate = dateStr;
        renderCalendar();
        renderDayEvents();
      };
      cell.addEventListener("click", selectThisDay);
      cell.addEventListener("keydown", (e)=>{
        if(e.key === "Enter" || e.key === " "){ e.preventDefault(); selectThisDay(); }
      });
      grid.appendChild(cell);
    }

    if(miniInTrailing){
      appendMiniPair();
      for(let i=2;i<trailingCount;i++) appendEmptyBox();
    } else {
      for(let i=0;i<trailingCount;i++) appendEmptyBox();
    }
  }

  /* ============ Mini calendars (fit into a single blank cell) ============ */
  function buildMiniCalendarInnerHtml(year, month, label){
    const firstDay = new Date(year, month, 1);
    const startOffset = firstDay.getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const todayString = todayStr();

    const dowHtml = DOW.map((d,i)=>`<span class="${i===0?"sun":i===6?"sat":""}">${d}</span>`).join("");
    let daysHtml = "";
    for(let i=0;i<startOffset;i++){
      daysHtml += `<div class="mini-cal-day empty"></div>`;
    }
    for(let day=1; day<=daysInMonth; day++){
      const dateStr = fmtDate(new Date(year, month, day));
      const dow = new Date(year, month, day).getDay();
      daysHtml += `<div class="mini-cal-day${dow===0?" sun":dow===6?" sat":""}${dateStr===todayString?" today":""}" data-date="${dateStr}">${day}</div>`;
    }
    return `<div class="mini-cal-title">${escapeHtml(label)}</div>
      <div class="mini-cal-dow">${dowHtml}</div>
      <div class="mini-cal-grid">${daysHtml}</div>`;
  }

  // Builds one mini calendar occupying exactly one grid cell (same footprint as
  // a normal day cell), used to fill a leading/trailing blank instead of leaving
  // it empty.
  function buildSingleMiniCal(year, month, label){
    const el = document.createElement("div");
    el.className = "mini-cal";
    el.innerHTML = buildMiniCalendarInnerHtml(year, month, label);
    el.querySelectorAll(".mini-cal-day[data-date]").forEach(dayEl=>{
      dayEl.addEventListener("click", ()=>{
        const d = parseDate(dayEl.dataset.date);
        viewYear = d.getFullYear();
        viewMonth = d.getMonth();
        selectedDate = dayEl.dataset.date;
        renderCalendar();
        renderDayEvents();
        renderExpenses();
      });
    });
    return el;
  }

  document.getElementById("nextMonth").addEventListener("click", ()=>{

  /* ============ Day Events List ============ */

    const d = parseDate(selectedDate);

    const f = getActiveFilters();
    let evs = getEventsForDate(selectedDate).filter(ev=>matchesFilters(ev,f));
    evs.sort((a,b)=>(a.start||"").localeCompare(b.start||""));
    countEl.textContent = evs.length;

    if(evs.length===0){
      listEl.innerHTML = `<div class="empty-state">해당 날짜의 일정이 없습니다.</div>`;
      return;
    }

    listEl.innerHTML = "";
    evs.forEach(ev=>{

      item.className = "item";
      const catTag = ev.category==="업무"?"tag-work":ev.category==="개인"?"tag-personal":ev.category==="회의"?"tag-meeting":ev.category==="교육"?"tag-edu":ev.category==="중요"?"tag-important":"tag-etc";
      const timeStr = ev.start ? (ev.start + (ev.end? " ~ "+ev.end : "")) : "종일";
      item.innerHTML = `
        <div class="item-body">
          <div class="item-title">${ev.important?"⭐ ":""}${escapeHtml(ev.title)}</div>
          <div class="item-meta">
            <span>${timeStr}</span>
            <span class="tag ${catTag}">${escapeHtml(ev.category)}</span>
            ${ev.recur && ev.recur!=="none" ? `<span class="tag tag-recur">🔁 ${recurLabel(ev.recur)}</span>` : ""}
            ${ev.weekendAdjust ? `<span class="tag tag-recur">📅 주말→평일 조정</span>` : ""}
          </div>
          ${ev.desc ? `<div class="item-meta">${escapeHtml(ev.desc)}</div>` : ""}
        </div>
        <div class="item-actions">
          <button data-act="edit" title="수정">✏️</button>

  function recurLabel(r){

  /* ============ Custom time picker (30-minute step scroll list) ============ */
  function setTimeFieldValue(fieldId, timeStr){
    document.getElementById(fieldId + "Value").value = timeStr || "";
    document.getElementById(fieldId).value = timeStr || "";
  }

  function buildTimeOptionsHtml(selectedValue){
    let html = "";
    for(let h=0; h<24; h++){
      for(let m=0; m<60; m+=30){
        const t = `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
        html += `<div class="time-option${t===selectedValue?" selected":""}" data-time="${t}">${t}</div>`;
      }
    }
    return html;
  }

  let activeTimeField = null;

  function positionTimeDropdown(fieldId){
    const input = document.getElementById(fieldId);
    const dropdown = document.getElementById("timeDropdown");
    const rect = input.getBoundingClientRect();
    // Attach flush to the input's bottom edge (like a native <select> dropdown),
    // not a floating card with a gap.
    dropdown.style.top = rect.bottom + "px";
    dropdown.style.left = rect.left + "px";
    dropdown.style.width = Math.max(rect.width, 100) + "px";
  }

  function openTimeDropdown(fieldId){
    activeTimeField = fieldId;
    const dropdown = document.getElementById("timeDropdown");
    const selectedValue = document.getElementById(fieldId + "Value").value;
    dropdown.innerHTML = buildTimeOptionsHtml(selectedValue);
    dropdown.querySelectorAll(".time-option").forEach(opt=>{
      opt.addEventListener("click", ()=>{
        selectTime(fieldId, opt.dataset.time);
        closeTimeDropdown();
      });
    });
    positionTimeDropdown(fieldId);
    dropdown.classList.add("open");
    const selectedOpt = dropdown.querySelector(".time-option.selected");
    if(selectedOpt) selectedOpt.scrollIntoView({block:"center"});
    else dropdown.scrollTop = 0;
  }
  function closeTimeDropdown(){
    document.getElementById("timeDropdown").classList.remove("open");
    activeTimeField = null;
  }
  function selectTime(fieldId, timeStr){
    setTimeFieldValue(fieldId, timeStr);
    if(fieldId === "eventStart" && !document.getElementById("eventEndValue").value){
      const [hh, mm] = timeStr.split(":").map(Number);
      const endHour = Math.min(hh + 1, 23);
      setTimeFieldValue("eventEnd", `${String(endHour).padStart(2,"0")}:${String(mm).padStart(2,"0")}`);
    }
  }
  document.getElementById("eventStart").addEventListener("click", ()=>openTimeDropdown("eventStart"));

  /* ============ To-Do ============ */
  const PRIORITY_RANK = { high:0, medium:1, low:2 };
  const PRIORITY_LABEL = { high:"🔴 높음", medium:"🟡 보통", low:"🔵 낮음" };
  const PRIORITY_TAG = { high:"tag-prio-high", medium:"tag-prio-medium", low:"tag-prio-low" };
  let todoSortMode = "default";

  function sortTodos(list){
    const sorted = list.slice();
    sorted.sort((a,b)=>{
      if(a.done !== b.done) return a.done ? 1 : -1;
      if(todoSortMode === "due"){
        if(!a.dueDate && !b.dueDate) return b.createdAt - a.createdAt;
        if(!a.dueDate) return 1;
        if(!b.dueDate) return -1;
        return a.dueDate.localeCompare(b.dueDate);
      }
      if(todoSortMode === "priority"){
        const pr = (PRIORITY_RANK[a.priority]??1) - (PRIORITY_RANK[b.priority]??1);
        if(pr !== 0) return pr;
        return b.createdAt - a.createdAt;
      }
      return b.createdAt - a.createdAt;
    });
    return sorted;
  }

  function renderTodos(){
    const listEl = document.getElementById("todoList");
    let filtered = todos.filter(t=>{
      if(todoFilterMode==="active") return !t.done;
      if(todoFilterMode==="done") return t.done;
      return true;
    });
    document.getElementById("todoCount").textContent = todos.filter(t=>!t.done).length;

    if(filtered.length===0){
      listEl.innerHTML = `<div class="empty-state">할 일이 없습니다.</div>`;
      return;
    }
    const today = todayStr();
    listEl.innerHTML = "";
    sortTodos(filtered).forEach((t, idx)=>{
      const item = document.createElement("div");
      item.className = `item pastel-card pastel-${idx % 6}` + (t.done?" done":"");
      const priority = t.priority || "medium";
      const overdue = t.dueDate && !t.done && t.dueDate < today;
      const dueLabel = t.dueDate ? `${t.dueDate.slice(5).replace("-","/")} 마감` : "";
      item.innerHTML = `
        <div class="checkbox ${t.done?"checked":""}" role="checkbox" aria-checked="${t.done}" tabindex="0" aria-label="완료 표시">${t.done?"✓":""}</div>
        <div class="item-body">
          <div class="item-title">${escapeHtml(t.text)}</div>
          <div class="item-meta">
            <span class="tag ${PRIORITY_TAG[priority]}">${PRIORITY_LABEL[priority]}</span>
            ${dueLabel ? `<span class="due-badge ${overdue?"due-overdue":""}">${overdue?"⚠️ ":"📅 "}${dueLabel}</span>` : ""}
          </div>
        </div>
        <div class="item-actions">
          <button data-act="edit" title="수정">✏️</button>
          <button data-act="del" title="삭제">🗑️</button>
        </div>`;
      const toggleDone = ()=>{
        t.done = !t.done;
        saveTodos(); renderTodos(); renderAISummary();
      };
      item.querySelector(".checkbox").addEventListener("click", toggleDone);
      item.querySelector(".checkbox").addEventListener("keydown", (e)=>{
        if(e.key === "Enter" || e.key === " "){ e.preventDefault(); toggleDone(); }
      });
      item.querySelector('[data-act="edit"]').addEventListener("click", ()=>openTodoModal(t));
      item.querySelector('[data-act="del"]').addEventListener("click", ()=>deleteTodo(t.id));
      listEl.appendChild(item);
    });
  }
  function addTodo(){
    const input = document.getElementById("todoInput");
    const text = input.value.trim();
    if(!text) return;
    const priority = document.getElementById("todoPriorityInput").value;
    const dueDate = document.getElementById("todoDueInput").value;
    todos.push({id:uid(), text, done:false, priority, dueDate, createdAt: Date.now()});
    input.value = "";
    document.getElementById("todoDueInput").value = "";
    document.getElementById("todoPriorityInput").value = "medium";
    saveTodos(); renderTodos(); renderAISummary();
  }
  function deleteTodo(id){
    todos = todos.filter(x=>x.id!==id);
    saveTodos(); renderTodos(); renderAISummary();
  }
  document.getElementById("todoAddBtn").addEventListener("click", addTodo);
  document.getElementById("todoInput").addEventListener("keydown", e=>{ if(e.key==="Enter") addTodo(); });

  function checkUpcomingNotifications(){
    if(!("Notification" in window) || Notification.permission !== "granted") return;
    const now = new Date();
    const rangeStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const rangeEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1);
    const occs = getOccurrencesInRange(rangeStart, rangeEnd);

    occs.forEach(o=>{
      const ev = o.ev;
      if(!ev.start) return;
      const [hh,mm] = ev.start.split(":").map(Number);
      const evTime = new Date(o.dateObj.getFullYear(), o.dateObj.getMonth(), o.dateObj.getDate(), hh, mm);
      const diffMin = (evTime - now) / 60000;
      const key = ev.id + "_" + fmtDate(o.dateObj);
      if(diffMin > 0 && diffMin <= 10 && !notifiedSet.has(key)){
        new Notification("📅 일정 알림", {
          body: `${ev.title} - ${ev.start}에 시작합니다.`,
        });
        notifiedSet.add(key);
        saveNotified();
      }
    });
  }

  function renderAISummary(){
    const todayEvs = getEventsForDate(todayStr()).sort((a,b)=>(a.start||"").localeCompare(b.start||""));

    // upcoming 7 days important events (excluding today)

    const rangeEnd = new Date();
    rangeEnd.setDate(rangeEnd.getDate()+7);
    const upcomingOccs = getOccurrencesInRange(rangeStart, rangeEnd).filter(o=>o.ev.important);
    upcomingOccs.sort((a,b)=> a.dateObj - b.dateObj);

    const importantToday = todayEvs.filter(e=>e.important);
    const today = todayStr();
    const overdueTodos = pendingTodos.filter(t=>t.dueDate && t.dueDate < today);

    let lines = [];
    const now = new Date();
    const hour = now.getHours();
    const greeting = hour < 11 ? "좋은 아침이에요!" : hour < 14 ? "좋은 점심 시간이에요!" : hour < 19 ? "좋은 오후에요!" : "편안한 저녁 되세요!";
    lines.push(greeting);

    if(importantToday.length>0){
      lines.push(`오늘 <b>중요 일정</b>이 있으니 특히 신경 써주세요: ${escapeHtml(importantToday.map(e=>e.title).join(", "))}`);
    } else if(todayEvs.length>0){
      const preview = todayEvs.slice(0,3).map(e=> `${e.start?e.start+" ":""}${e.title}`).join(", ");
      lines.push(`오늘 일정: ${escapeHtml(preview)}${todayEvs.length>3?" 등":""}`);
    } else {
      lines.push("오늘 등록된 일정은 없어요. 여유로운 하루를 보내세요. 😊");
    }

    if(overdueTodos.length>0){
      lines.push(`⚠️ <b>마감이 지난 할 일이 ${overdueTodos.length}개</b> 있어요: ${escapeHtml(overdueTodos.slice(0,2).map(t=>t.text).join(", "))}${overdueTodos.length>2?" 등":""} — 먼저 처리해보는 건 어떨까요?`);

  /* ============ 조세일보 세무 이슈 브리핑 ============ */
  // Fetches the "세무" RSS feed live from joseilbo.com (their server sends
  // Access-Control-Allow-Origin: * on this feed, so a direct browser fetch works).
  // Cached in localStorage for an hour so routine re-renders (todo/event edits)
  // don't refetch; only Init and the manual refresh button hit the network.
  const TAX_NEWS_CACHE_KEY = "aisch_taxnews_cache";
  const TAX_NEWS_TTL_MS = 60 * 60 * 1000;

  async function fetchTaxNewsItems(){
    const res = await fetch("https://www.joseilbo.com/Contents/rss/rss_tax.php");
    if(!res.ok) throw new Error("network error");
    const buf = await res.arrayBuffer();
    const xmlText = new TextDecoder("euc-kr").decode(buf);
    const doc = new DOMParser().parseFromString(xmlText, "text/xml");
    return Array.from(doc.querySelectorAll("item")).slice(0, 3).map(item => ({
      title: (item.querySelector("title")?.textContent || "").trim(),
      link: (item.querySelector("link")?.textContent || "").trim()
    })).filter(it => it.title);
  }

  function renderTaxNewsItems(items){
    const el = document.getElementById("aiTaxNews");
    if(!items || items.length === 0){ el.innerHTML = ""; return; }
    el.innerHTML = `<div class="ai-tax-news-title">📰 조세일보 세무 이슈</div>` +
      items.map(it => `<div class="ai-tax-news-item"><a href="${escapeHtml(it.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(it.title)}</a></div>`).join("");
  }

  async function renderTaxNews(forceRefresh){
    const cached = load(TAX_NEWS_CACHE_KEY, null);
    const now = Date.now();
    if(!forceRefresh && cached && (now - cached.ts) < TAX_NEWS_TTL_MS){
      renderTaxNewsItems(cached.items);
      return;
    }
    try{
      const items = await fetchTaxNewsItems();
      save(TAX_NEWS_CACHE_KEY, {ts: now, items});
      renderTaxNewsItems(items);
    }catch(e){
      if(cached) renderTaxNewsItems(cached.items);
    }
  }

  function seedTaxEvents(){
    const SEED_KEY = "aisch_tax_seeded_v1";

    const alreadySeeded = !!localStorage.getItem(SEED_KEY) || events.some(ev=>knownTaxTitles.includes(ev.title));
    if(!alreadySeeded){
      const y = new Date().getFullYear();
      const taxEvents = [
        { title:"부가가치세 2기 확정신고·납부", date:`${y}-01-25`, category:"업무", start:"", end:"", desc:"전년도 10~12월분 부가가치세 확정신고 및 납부 (마감일이 주말이면 다음 평일로 자동 조정)", recur:"yearly", recurEnd:"", important:true, taxAuto:true, weekendAdjust:true },
        { title:"부가가치세 1기 예정신고·납부", date:`${y}-04-25`, category:"업무", start:"", end:"", desc:"1~3월분 부가가치세 예정신고 및 납부 (마감일이 주말이면 다음 평일로 자동 조정)", recur:"yearly", recurEnd:"", important:true, taxAuto:true, weekendAdjust:true },
        { title:"부가가치세 1기 확정신고·납부", date:`${y}-07-25`, category:"업무", start:"", end:"", desc:"4~6월분 부가가치세 확정신고 및 납부 (마감일이 주말이면 다음 평일로 자동 조정)", recur:"yearly", recurEnd:"", important:true, taxAuto:true, weekendAdjust:true },
        { title:"부가가치세 2기 예정신고·납부", date:`${y}-10-25`, category:"업무", start:"", end:"", desc:"7~9월분 부가가치세 예정신고 및 납부 (마감일이 주말이면 다음 평일로 자동 조정)", recur:"yearly", recurEnd:"", important:true, taxAuto:true, weekendAdjust:true },
        { title:"원천세(갑근세) 신고·납부", date:`${y}-01-10`, category:"업무", start:"", end:"", desc:"전월분 근로소득세 등 원천징수세액 신고 및 납부 (매월 10일, 마감일이 주말이면 다음 평일로 자동 조정)", recur:"monthly", recurEnd:"", important:false, taxAuto:true, weekendAdjust:true },
      ];
      taxEvents.forEach(ev=>{ ev.id = uid(); events.push(ev); });
      saveEvents();
      localStorage.setItem(SEED_KEY, "1");
    } else if(!localStorage.getItem(SEED_KEY)){
      localStorage.setItem(SEED_KEY, "1");
    }
    // Migration: events seeded before the taxAuto/weekendAdjust fields existed are identified by title.
    let migrated = false;
    events.forEach(ev=>{
      if(knownTaxTitles.includes(ev.title) && !ev.weekendAdjust){
        ev.taxAuto = true;
        ev.weekendAdjust = true;
        migrated = true;
      }
    });
    if(migrated) saveEvents();
  }
  /* ============ Init ============ */
  // .modal has a CSS transform (its open/close animation), which per spec makes it
  // the containing block for any position:fixed descendant. Move these popups to be
  // direct children of <body> so their fixed coordinates resolve against the viewport,
  // not the modal box.
  document.body.appendChild(document.getElementById("eventDatePopup"));
  document.body.appendChild(document.getElementById("timeDropdown"));

  function renderAllViews(){
    renderDow();
    renderCalendar();
    renderDayEvents();
    renderTodos();
    renderMemos();
    renderExpenses();
    renderAISummary();
    renderTaxNews();
    checkUpcomingNotifications();
  }

  loadFromCloud().finally(()=>{
    seedTaxEvents();
    renderAllViews();

    // Refresh AI summary + calendar periodically to catch date rollover
    setInterval(()=>{
      renderAISummary();
    }, 60000);

    let lastDayCheck = todayStr();
    setInterval(()=>{
      const cur = todayStr();
      if(cur !== lastDayCheck){
        lastDayCheck = cur;
        renderCalendar();
        renderAISummary();
      }
    }, 30000);
  });

})();
</script>
</body>
</html>
